version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/sanmon/middleware/proto
plugins:
  - local: protoc-gen-go
    out: middleware/proto
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: middleware/proto
    opt: paths=source_relative
