name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: middleware
    env:
      # sanmon is pure Go: static, reproducible binaries with no C toolchain.
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: middleware/go.mod
          cache-dependency-path: middleware/go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

      - name: Generated schemas are in sync
        working-directory: ${{ github.workspace }}
        run: |
          (cd middleware && go build -o ../bin/sanmon ./cmd/sanmon)
          for d in browser api database iac approval agent; do
            ./bin/sanmon schema --domain "$d" > "schema/generated/$d-action.json"
          done
          git diff --exit-code -- schema/generated \
            || { echo "::error::Generated schemas are stale — run 'just schema' and commit."; exit 1; }

  cue:
    name: CUE policy vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: middleware/go.mod

      - name: Install cue
        run: go install cuelang.org/go/cmd/cue@latest

      - name: Vet CUE policies
        run: |
          cue vet ./policy/base/
          cue vet ./policy/domains/browser/
          cue vet ./policy/domains/api/
          cue vet ./policy/domains/database/
          cue vet ./policy/domains/iac/
          cue vet ./policy/domains/approval/
          cue vet ./policy/domains/agent/

  lean:
    name: Lean proof check (第三門)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installs elan, reads prover/lean-toolchain (v4.16.0), runs `lake build`.
      # This is the third gate: the meta-proofs (deny_dominates et al.) must
      # type-check on every change, so the property the Go engine relies on
      # stays machine-verified — not just asserted in docs.
      - name: Build Lean proofs
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: prover
          build: true
